version: 2

project_name: septiembre

before:
  hooks:
    - go mod tidy

builds:
  - id: septiembre
    main: ./cmd/septiembre
    binary: septiembre
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/septiembre-ai/septiembre-cli/internal/version.Version={{.Version}}
      - -X github.com/septiembre-ai/septiembre-cli/internal/version.Commit={{.Commit}}
      - -X github.com/septiembre-ai/septiembre-cli/internal/version.BuiltAt={{.Date}}

archives:
  - id: septiembre
    ids:
      - septiembre
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "septiembre_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

